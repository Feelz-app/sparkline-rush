<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sparkline Rush App Store Screenshots</title>
    <style>
      body {
        margin: 0;
        background: #080b10;
        color: #f8fafc;
        font-family: Arial, sans-serif;
      }
      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 32px;
      }
      p {
        color: #a8b3c2;
        margin: 0 0 24px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
      }
      figure {
        margin: 0;
        padding: 12px;
        background: #111827;
        border: 1px solid #263445;
        border-radius: 10px;
      }
      img {
        display: block;
        width: 100%;
        border-radius: 8px;
      }
      figcaption {
        padding-top: 10px;
        color: #cbd5e1;
        font-size: 14px;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sparkline Rush App Store Screenshots</h1>
      <p>Upload the JPG files from this same folder to App Store Connect.</p>
      <section class="grid">
        <figure>
          <img src="01-dodge-collect-score-1242x2688.jpg" alt="Dodge fast collect sparks screenshot" />
          <figcaption>01-dodge-collect-score-1242x2688.jpg</figcaption>
        </figure>
        <figure>
          <img src="02-unlock-ball-skins-1242x2688.jpg" alt="Unlock ball skins screenshot" />
          <figcaption>02-unlock-ball-skins-1242x2688.jpg</figcaption>
        </figure>
        <figure>
          <img src="03-shop-boosts-shields-1242x2688.jpg" alt="Shop boosts and shields screenshot" />
          <figcaption>03-shop-boosts-shields-1242x2688.jpg</figcaption>
        </figure>
        <figure>
          <img src="04-open-reward-chests-1242x2688.jpg" alt="Open reward chests screenshot" />
          <figcaption>04-open-reward-chests-1242x2688.jpg</figcaption>
        </figure>
        <figure>
          <img src="05-chase-high-scores-1242x2688.jpg" alt="Chase high scores screenshot" />
          <figcaption>05-chase-high-scores-1242x2688.jpg</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
