<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Rocket Librarian</title>
  <desc id="desc">Silent launch</desc>
  <defs>
    <radialGradient id="ball" cx="34%" cy="27%" r="72%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="16%" stop-color="#ffffff"/>
      <stop offset="42%" stop-color="#7df2dd"/>
      <stop offset="78%" stop-color="#ff4f87"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#7df2dd" stop-opacity="0.48"/>
      <stop offset="68%" stop-color="#7df2dd" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#7df2dd" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="18" fill="#090d13"/>
  <circle cx="128" cy="128" r="94" fill="url(#glow)"/>
  <path d="M104 176 L128 232 L152 176 Z" fill="#7df2dd" opacity="0.22"/>
  <circle cx="128" cy="128" r="58" fill="url(#ball)" filter="url(#softGlow)" stroke="rgba(255,255,255,0.26)" stroke-width="3"/>
  <rect x="86" y="112" width="84" height="28" rx="14" fill="#05070c" opacity="0.86"/>
    <rect x="103" y="119" width="50" height="8" rx="4" fill="#ff4f87" filter="url(#softGlow)"/>
  <circle cx="105" cy="103" r="15" fill="#ffffff" opacity="0.38"/>
  <circle cx="128" cy="128" r="70" fill="none" stroke="#7df2dd" stroke-opacity="0.42" stroke-width="3"/>
</svg>