<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Galactic Knight</title>
  <desc id="desc">Laser oath</desc>
  <defs>
    <radialGradient id="ball" cx="34%" cy="27%" r="72%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="16%" stop-color="#ffffff"/>
      <stop offset="42%" stop-color="#4c1d95"/>
      <stop offset="78%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.48"/>
      <stop offset="68%" stop-color="#a78bfa" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="18" fill="#090d13"/>
  <circle cx="128" cy="128" r="94" fill="url(#glow)"/>
  <path d="M104 176 L128 232 L152 176 Z" fill="#a78bfa" opacity="0.22"/>
  <circle cx="128" cy="128" r="58" fill="url(#ball)" filter="url(#softGlow)" stroke="rgba(255,255,255,0.26)" stroke-width="3"/>
  <path d="M137 73 L100 134 L124 134 L113 185 L160 116 L135 116 Z" fill="#22c55e" filter="url(#softGlow)"/>
  <circle cx="105" cy="103" r="15" fill="#ffffff" opacity="0.38"/>
  <circle cx="128" cy="128" r="70" fill="none" stroke="#a78bfa" stroke-opacity="0.42" stroke-width="3"/>
</svg>